  "intel-oneapi-compiler-shared-runtime-libs",
  "intel-oneapi-openmp",
  "intel-oneapi-tcm",
  "inter-font",
  { name = "kanata", hooks = { after_sync = [
    "sh",
    "-lc",
    "grep -q uinput /etc/group || sudo groupadd uinput; sudo usermod -aG input,uinput $USER; echo 'KERNEL==\"uinput\", MODE=\"0660\", GROUP=\"uinput\", OPTIONS+=\"static_node=uinput\"' | sudo tee /etc/udev/rules.d/99-input.rules >/dev/null; sudo udevadm control --reload-rules && sudo udevadm trigger; systemctl --user daemon-reload; systemctl --user enable kanata.service",
  ] } },
  "kitty",
  "kservice",
  "kvantum",
  { name = "libvirt", hooks = { after_sync = [
    "sh",
    "-lc",
    "sudo systemctl enable --now libvirtd.service; sudo usermod -aG libvirt $USER",
  ] } },
  "lib32-libva-intel-driver",
  "lib32-mesa",
  "lib32-nvidia-utils",
  "lib32-opencl-nvidia",
  "lib32-vulkan-intel",
