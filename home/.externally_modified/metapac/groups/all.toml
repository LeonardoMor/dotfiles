[arch]
packages = [
  "1password",
  "1password-cli",
  "adobe-source-han-sans-cn-fonts",
  "adobe-source-han-sans-jp-fonts",
  "adobe-source-han-sans-kr-fonts",
  "adw-gtk-theme",
  "arch-install-scripts",
  "asciinema",
  "asciinema-agg",
  "bat",
  "bats",
  "bats-assert",
  "bats-file",
  "bc",
  "blesh-git",
  "blueman",
  "breeze",
  "breezy",
  "brightnessctl",
  "chezmoi",
  "chromium",
  "cliphist",
  "cmatrix-git",
  "cowpatty",
  "cpio",
  "dasel",
  "ddcutil",
  "devtools",
  "dhclient",
  "discord",
  "docker",
  "docker-compose",
  "dolphin",
  "dos2unix",
  "edk2-ovmf",
  "evtest",
  "expac",
  "ex-vi-compat",
  "ghostscript",
  "ghostty",
  "github-cli",
  "glow",
  "gnome-keyring",
  "go",
  { name = "greetd", hooks = { after_sync = [
    "sh",
    "-lc",
    "sudo systemctl enable greetd.service",
  ] } },
  "grim",
  "grimblast-git",
  "gtk-engine-murrine",
  "gum",
  "heroic-games-launcher-bin",
  "hypridle",
  "hyprland",
  "hyprlauncher",
  "hyprlock",
  "hyprpaper",
  "hyprpicker",
  "hyprpolkitagent",
  "hyprsunset",
  "intel-media-driver",
  "intel-oneapi-common",
  "intel-oneapi-compiler-shared-runtime-libs",
  "intel-oneapi-openmp",
  "intel-oneapi-tcm",
  { name = "kanata", hooks = { after_sync = [
    "sh",
    "-lc",
    "grep -q uinput /etc/group || sudo groupadd uinput; sudo usermod -aG input,uinput $USER; echo 'KERNEL==\"uinput\", MODE=\"0660\", GROUP=\"uinput\", OPTIONS+=\"static_node=uinput\"' | sudo tee /etc/udev/rules.d/99-input.rules >/dev/null; sudo udevadm control --reload-rules && sudo udevadm trigger; systemctl --user daemon-reload; systemctl --user enable kanata.service",
  ] } },
  "kitty",
  "kservice",
  "kvantum",
  { name = "libvirt", hooks = { after_sync = [
    "sh",
    "-lc",
    "sudo systemctl enable --now libvirtd.service; sudo usermod -aG libvirt $USER",
  ] } },
  "lib32-libva-intel-driver",
  "lib32-mesa",
  "lib32-nvidia-utils",
  "lib32-opencl-nvidia",
  "lib32-vulkan-intel",
  "libheif",
  "libqalculate",
  "libva-intel-driver",
  "libva-nvidia-driver",
  "localsend",
  "lshw",
  "matugen",
  "mercurial",
  "metapac",
  "namcap",
  { name = "kanata-switcher", hooks = { after_sync = [
    "sh",
    "-lc",
    "systemctl --user daemon-reload; systemctl --user enable --now kanata-switcher.service",
  ] } },
  "neovim",
  "nerd-fonts-inter",
  "net-tools",
  "nmap",
  "noto-color-emoji-fontconfig",
  "noto-fonts-extra",
  "ntfs-3g",
  "ntp",
  "nvidia-prime",
  "nvidia-settings",
  "nvidia-utils",
  "nvm",
  "obsidian",
  "octopi",
  "opencl-nvidia",
  "opencode",
  "opendesktop-fonts",
  "playerctl",
  "pngcheck",
  "protonplus",
  "protonup-qt",
  "protonutils",
  "qemu-full",
  "qq-git",
  "qt6ct-kde",
  "qt6-languageserver",
  "quickshell",
  "rink",
  "satty",
  "sbctl",
  "scdoc",
  "scopebuddy-git",
  "seahorse",
  "slurp",
  "starship",
  "strace",
  "sshpass",
  "subversion",
  "swtpm",
  "switcheroo-control",
  "telegram-desktop",
  "tmux",
  "tokyonight-gtk-theme-git",
  "tree",
  "tree-sitter-cli",
  "ttf-fantasque-nerd",
  "ttf-hack",
  "ttf-jetbrains-mono-nerd",
  "ttf-lato",
  "ttf-material-symbols-variable-git",
  "ufw-docker",
  "unixodbc",
  "uv",
  "uvicorn",
  "virt-manager",
  "vorta",
  "vulkan-intel",
  "wallust",
  "wireless-regdb",
  "wl-clipboard",
  "xdg-desktop-portal-gtk",
  "xdg-desktop-portal-hyprland",
  "xf86-input-libinput",
  "xorg-server",
  "xorg-xdpyinfo",
  "xorg-xinit",
  "xorg-xinput",
  "xorg-xkill",
  "xorg-xrandr",
  "zathura",
  "zathura-pdf-mupdf",
  "zen-browser-bin",
]

[npm]
packages = ["corepack", "npm", "prettier", "prettier-plugin-awk"]

[pipx]
packages = [
  { name = "markitdown", hooks = { after_sync = [
    "sh",
    "-lc",
    "$HOME/bin/update-markitdown-mcp",
  ] } },
  "vdf2json",
]
