  "metapac",
  "namcap",
  { name = "kanata-switcher", hooks = { after_sync = [
    "sh",
    "-lc",
    "systemctl --user daemon-reload; systemctl --user enable --now kanata-switcher.service",
  ] } },
  "neovim",
  "nerd-fonts-inter",
  "net-tools",
  "nmap",
  "noto-color-emoji-fontconfig",
  "noto-fonts-extra",
  "ntp",
  "nvidia-prime",
  "nvidia-settings",
  "nvidia-utils",
  "nvm",
  "obsidian",
  "octopi",
  "opencl-nvidia",
  "opencode",
  "opendesktop-fonts",
  "playerctl",
  "pngcheck",
  "protonplus",
  "protonup-qt",
  "protonutils",
  "qemu-full",
  "qq-git",
  "qt6ct-kde",
  "qt6-languageserver",
  "qt6-multimedia",
  "quickshell",
  "rink",
  "satty",
  "sbctl",
  "scdoc",
