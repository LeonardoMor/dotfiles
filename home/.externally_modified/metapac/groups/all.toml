  # Optional packages
  "cmake",
  "linux-cachyos-lts-nvidia-open",
  "onlyoffice-bin",
  "python-pipx",
  "vpl-gpu-rt",

  { name = "openrazer-daemon", hooks = { after_sync = [
    "sh",
    "-lc",
    "grep -q plugdev /etc/group || sudo groupadd plugdev; sudo gpasswd -a $USER plugdev; grep -q openrazer /etc/group || sudo groupadd openrazer; sudo gpasswd -a $USER openrazer; systemctl --user enable openrazer-daemon.service",
  ] } },
  "openrazer-driver-dkms",
  "polychromatic",
  "wlr-randr",
  "cups-pk-helper",
  "kimageformats",
  "wireshark-cli",
]

[npm]
packages = ["corepack", "npm", "prettier", "prettier-plugin-awk"]

[pipx]
packages = [
  { name = "markitdown", hooks = { after_sync = [
    "sh",
    "-lc",
    "$HOME/bin/update-markitdown-mcp",
  ] } },
  "vdf2json",
]
